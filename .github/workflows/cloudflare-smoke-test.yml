name: Cloudflare Smoke Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Serve site locally and verify routes
        shell: bash
        run: |
          set -euo pipefail

          python3 .github/scripts/pages_smoke_server.py --root . --port 8788 >/tmp/pages-smoke-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" >/dev/null 2>&1 || true' EXIT

          BASE_URL="http://127.0.0.1:8788"

          for attempt in $(seq 1 10); do
            if curl -sS -o /dev/null --max-time 5 "$BASE_URL/"; then
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "Local smoke server failed to start."
              cat /tmp/pages-smoke-server.log || true
              exit 1
            fi

            sleep 1
          done

          routes=(
            "/"
            "/about/"
            "/blog/"
            "/blog/categories/"
            "/blog/tags/"
            "/blog/posts/homelab-start-here"
            "/blog/posts/homelab-backup-automation"
            "/blog/posts/platform-engineering-at-scale"
          )

          check_route() {
            local route="$1"
            local tmp
            tmp=$(mktemp)
            local status

            if ! status=$(curl \
              -sS \
              --max-time 5 \
              -o "$tmp" \
              -w "%{http_code}" \
              "$BASE_URL$route"); then
              echo "Route request error: $route"
              if [ -s "$tmp" ]; then
                echo "Body preview:"
                head -c 400 "$tmp" || true
                echo
              fi
              rm -f "$tmp"
              return 1
            fi

            if [ "$status" != "200" ]; then
              echo "Route failed: $route (status $status)"
              echo "Body preview:"
              head -c 400 "$tmp" || true
              echo
              rm -f "$tmp"
              return 1
            fi

            rm -f "$tmp"
            return 0
          }

          for route in "${routes[@]}"; do
            check_route "$route"
          done

          echo "All smoke test routes returned 200."