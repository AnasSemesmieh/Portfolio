name: Cloudflare Smoke Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      BASE_URL: https://anas.semesmieh.com
      USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36
    steps:
      - name: Wait for deploy and verify routes
        shell: bash
        run: |
          set -euo pipefail

          initial_wait_seconds=45
          echo "Waiting ${initial_wait_seconds}s for deploy propagation before smoke checks."
          sleep "$initial_wait_seconds"

          routes=(
            "/"
            "/about/"
            "/blog/"
            "/blog/categories/"
            "/blog/tags/"
            "/blog/posts/homelab-start-here"
            "/blog/posts/homelab-backup-automation"
            "/blog/posts/platform-engineering-at-scale"
          )

          check_route() {
            local route="$1"
            local tmp
            tmp=$(mktemp)
            local status

            if ! status=$(curl \
              -sS \
              --retry 2 \
              --retry-delay 2 \
              --retry-all-errors \
              --connect-timeout 5 \
              --max-time 10 \
              --user-agent "$USER_AGENT" \
              --header "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              --header "Accept-Language: en-US,en;q=0.9" \
              --compressed \
              -o "$tmp" \
              -w "%{http_code}" \
              "$BASE_URL$route"); then
              echo "Route request error: $route"
              if [ -s "$tmp" ]; then
                echo "Body preview:"
                head -c 400 "$tmp" || true
                echo
              fi
              rm -f "$tmp"
              return 1
            fi

            if [ "$status" != "200" ]; then
              echo "Route failed: $route (status $status)"
              echo "Body preview:"
              head -c 400 "$tmp" || true
              echo
              rm -f "$tmp"
              return 1
            fi

            rm -f "$tmp"
            return 0
          }

          for attempt in $(seq 1 8); do
            echo "Smoke test attempt $attempt/8"
            failed=0

            for route in "${routes[@]}"; do
              if ! check_route "$route"; then
                failed=1
              fi
            done

            if [ "$failed" -eq 0 ]; then
              echo "All smoke test routes returned 200."
              exit 0
            fi

            if [ "$attempt" -lt 8 ]; then
              echo "Deploy not ready yet; retrying in 30 seconds."
              sleep 30
            fi
          done

          echo "Smoke test failed after 8 attempts."
          exit 1