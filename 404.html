<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | Anas Semesmieh</title>
  <meta name="description" content="The page you requested could not be found on anas.semesmieh.com." />
  <meta name="robots" content="noindex, follow" />
  <style>
    :root {
      --bg: #0b1220;
      --panel: #101a2c;
      --text: #e6eef8;
      --muted: #8ea0be;
      --accent: #22c55e;
      --border: rgba(255, 255, 255, 0.08);
      --font: "IBM Plex Sans", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.12), transparent 30%),
        var(--bg);
    }

    main {
      width: min(100%, 720px);
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.5);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 16px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      padding: 11px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    a:hover {
      transform: translateY(-1px);
      border-color: rgba(34, 197, 94, 0.45);
      background: rgba(34, 197, 94, 0.08);
    }

    @media (max-width: 640px) {
      main {
        padding: 26px 22px;
      }

      p {
        font-size: 16px;
      }

      nav {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main>
    <span class="eyebrow">404</span>
    <h1>That page does not exist.</h1>
    <p>The route may have moved, the URL may be wrong, or the page was removed. Use one of the links below to get back to the main site content.</p>
    <nav aria-label="Recovery links">
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/blog/">Blog</a>
      <a href="/blog/posts/homelab-start-here">Featured post</a>
    </nav>
  </main>
</body>

</html>
